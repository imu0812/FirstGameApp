<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="seedCore" x1="184" y1="256" x2="360" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8B63"/>
      <stop offset="35%" stop-color="#FFB08A"/>
      <stop offset="68%" stop-color="#FFE1C8"/>
      <stop offset="100%" stop-color="#FFD0B6"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(270 256) rotate(90) scale(84 84)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFF0E4"/>
      <stop offset="100%" stop-color="#FFC2A6"/>
    </radialGradient>
    <linearGradient id="trailGlow" x1="74" y1="286" x2="226" y2="246" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8B63" stop-opacity="0"/>
      <stop offset="55%" stop-color="#FF9E7A" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#FFD2BC" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="leafEdge" x1="198" y1="209" x2="312" y2="304" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A8FF87"/>
      <stop offset="100%" stop-color="#57C95B"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wideGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.75 0 0 0
                0 0 0.55 0 0
                0 0 0 0.95 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <path d="M70 287
