<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="discBody" x1="160" y1="256" x2="368" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4EDBFF"/>
      <stop offset="40%" stop-color="#9CF9FF"/>
      <stop offset="72%" stop-color="#F2FFFF"/>
      <stop offset="100%" stop-color="#9EEFFF"/>
    </linearGradient>

    <radialGradient id="innerCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(258 256) rotate(90) scale(78 78)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E9FEFF"/>
      <stop offset="100%" stop-color="#8CEFFF"/>
    </radialGradient>

    <linearGradient id="bladeLight" x1="98" y1="256" x2="414" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#83F6FF"/>
      <stop offset="48%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C6FFFF"/>
    </linearGradient>

    <linearGradient id="tailGlow" x1="76" y1="280" x2="208" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#55E8FF" stop-opacity="0"/>
      <stop offset="55%" stop-color="#7EF9FF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#D8FFFF" stop-opacity="0.92"/>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="wideGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.95
                0 0 0 0 1
                0 0 0 0.95 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- motion trail -->
  <path d="M72 281
           C106 278, 132 271, 154 262
           C176 253, 194 246, 210 244"
        stroke="url(#tailGlow)" stroke-width="44" stroke-linecap="round" filter="url(#wideGlow)"/>
  <path d="M82 244
           C124 232, 158 228, 197 236"
        stroke="#9AF9FF" stroke-opacity="0.28" stroke-width="12" stroke-linecap="round" stroke-dasharray="5 16"/>
  <path d="M86 311
           C128 320, 162 313, 204 292"
        stroke="#CCFFFF" stroke-opacity="0.24" stroke-width="10" stroke-linecap="round" stroke-dasharray="3 14"/>

  <!-- orbit ring aura -->
  <g filter="url(#softGlow)">
    <ellipse cx="258" cy="256" rx="120" ry="92" fill="#6BEFFF" fill-opacity="0.12"/>
    <ellipse cx="258" cy="256" rx="104" ry="78" stroke="#9AFFFF" stroke-opacity="0.28" stroke-width="10"/>
  </g>

  <!-- spinning blade -->
  <g filter="url(#wideGlow)">
    <path d="M110 256
             C150 228, 192 212, 258 208
             C324 212, 366 228, 406 256
             C366 284, 324 300, 258 304
             C192 300, 150 284, 110 256 Z"
          fill="url(#bladeLight)" fill-opacity="0.88"/>

    <path d="M178 256
             C206 234, 228 222, 258 218
             C288 222, 310 234, 338 256
             C310 278, 288 290, 258 294
             C228 290, 206 278, 178 256 Z"
          fill="url(#innerCore)" fill-opacity="0.96"/>

    <circle cx="258" cy="256" r="48" fill="url(#innerCore)" fill-opacity="0.95"/>
    <circle cx="258" cy="256" r="22" fill="#FFFFFF" fill-opacity="0.95"/>
  </g>

  <!-- outer disc / cutting edge -->
  <g filter="url(#wideGlow)">
    <ellipse cx="258" cy="256" rx="96" ry="70" fill="none" stroke="url(#discBody)" stroke-width="30"/>
    <ellipse cx="258" cy="256" rx="110" ry="82" fill="none" stroke="#B9FFFF" stroke-opacity="0.72" stroke-width="8"/>
    <ellipse cx="258" cy="256" rx="82" ry="58" fill="none" stroke="#4ACFFF" stroke-opacity="0.62" stroke-width="6"/>
  </g>

  <!-- blade tips -->
  <g filter="url(#softGlow)">
    <path d="M392 256 L436 242 L454 256 L436 270 Z" fill="#E9FFFF"/>
    <path d="M124 256 L86 242 L68 256 L86 270 Z" fill="#9BF5FF" fill-opacity="0.84"/>
  </g>

  <!-- arc highlights -->
  <path d="M170 205 C196 184, 223 174, 258 172 C298 174, 324 188, 347 209"
        stroke="#FFFFFF" stroke-opacity="0.46" stroke-width="8" stroke-linecap="round"/>
  <path d="M176 307 C205 322, 231 330, 258 332 C290 330, 317 321, 343 306"
        stroke="#D4FFFF" stroke-opacity="0.36" stroke-width="6" stroke-linecap="round"/>

  <!-- holy spark particles -->
  <g fill="#EFFFFF" filter="url(#tinyGlow)">
    <circle cx="138" cy="212" r="4"/>
    <circle cx="160" cy="302" r="4"/>
    <circle cx="228" cy="175" r="4.5"/>
    <circle cx="318" cy="181" r="4"/>
    <circle cx="390" cy="216" r="4.5"/>
    <circle cx="395" cy="294" r="4"/>
  </g>
</svg>
