name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Build mode for GitHub Pages deployment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show deploy mode
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Deploy mode: ${{ github.event.inputs.deploy_mode }}"

      - name: Show deploy mode
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "Deploy mode: production"

      - name: Build production
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_mode == 'production'
        run: npm run build

      - name: Build staging
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'staging'
        run: npm run build:staging

      - name: Summarize deploy target
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "## GitHub Pages Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ github.event.inputs.deploy_mode }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event.inputs.deploy_mode }}" = "staging" ]; then
            echo "- Test mode build flag: enabled" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Test mode build flag: disabled" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summarize deploy target
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "## GitHub Pages Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: production" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test mode build flag: disabled" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
