<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spikeStone" x1="156" y1="320" x2="394" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6B5849"/>
      <stop offset="38%" stop-color="#A78A72"/>
      <stop offset="72%" stop-color="#D9C2A2"/>
      <stop offset="100%" stop-color="#FFF0D6"/>
    </linearGradient>
    <linearGradient id="spikeEdge" x1="180" y1="300" x2="400" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7D6A56"/>
      <stop offset="60%" stop-color="#E5D1B1"/>
      <stop offset="100%" stop-color="#FFF7E8"/>
    </linearGradient>
    <linearGradient id="groundGlow" x1="84" y1="324" x2="410" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D87C38" stop-opacity="0"/>
      <stop offset="40%" stop-color="#F09A4C" stop-opacity="0.36"/>
      <stop offset="75%" stop-color="#FFD7A1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF0D7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="dustWarm" x1="120" y1="266" x2="404" y2="266" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7A45B" stop-opacity="0"/>
      <stop offset="58%" stop-color="#FFC788" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFE3C2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wideGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

