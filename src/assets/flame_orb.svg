<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5b1f" stop-opacity="0"/>
      <stop offset="28%" stop-color="#ff6a00" stop-opacity="0.52"/>
      <stop offset="70%" stop-color="#ff9a1f" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#ffd86a" stop-opacity="1"/>
    </linearGradient>

    <radialGradient id="orbGlow" cx="58%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#fff8de"/>
      <stop offset="18%" stop-color="#ffe57a"/>
      <stop offset="48%" stop-color="#ffb21f"/>
      <stop offset="78%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#b32000"/>
    </radialGradient>

    <radialGradient id="coreFlash" cx="58%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="38%" stop-color="#fff2a8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff2a8" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.25"/>
    </filter>

    <filter id="blurWide" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- rear heat haze -->
  <ellipse cx="17" cy="24" rx="12" ry="6.4" fill="#ff7a18" opacity="0.28" filter="url(#blurWide)"/>
  <ellipse cx="22.5" cy="24" rx="16" ry="8.2" fill="#ff5a00" opacity="0.18" filter="url(#blurWide)"/>

  <!-- flame tail -->
  <path d="M5 24
           C10 14, 20 12, 31 18
           C26 20, 21 22, 16 24
           C21 26, 26 28, 31 30
           C20 36, 10 34, 5 24Z"
        fill="url(#tailGrad)" opacity="0.92"/>

  <!-- upper flame lick -->
  <path d="M10 22
           C13 15, 21 12, 28 15
           C23 16, 20 18, 17 21
           C15 22, 13 22.5, 10 22Z"
        fill="#ffb43a" opacity="0.72" filter="url(#blurSoft)"/>

  <!-- lower flame lick -->
  <path d="M10 26
           C13 33, 21 36, 28 33
           C23 32, 20 30, 17 27
           C15 26, 13 25.5, 10 26Z"
        fill="#ff7a22" opacity="0.72" filter="url(#blurSoft)"/>

  <!-- explosion aura around orb -->
  <circle cx="32" cy="24" r="12.2" fill="#ff7a18" opacity="0.25" filter="url(#blurWide)"/>
  <circle cx="32" cy="24" r="9.8" fill="#ffae2a" opacity="0.28" filter="url(#blurSoft)"/>

  <!-- main orb -->
  <circle cx="32" cy="24" r="8.2" fill="url(#orbGlow)"/>

  <!-- core flash -->
  <circle cx="33" cy="23" r="4.8" fill="url(#coreFlash)"/>

  <!-- hot rim -->
  <ellipse cx="34" cy="24" rx="6.5" ry="5.8" fill="#fff0a8" opacity="0.18"/>

  <!-- sparks -->
  <ellipse cx="39.6" cy="17.6" rx="1.4" ry="0.7" transform="rotate(-24 39.6 17.6)" fill="#ffe38b"/>
  <ellipse cx="41.2" cy="24" rx="1.9" ry="0.9" transform="rotate(6 41.2 24)" fill="#ffd15c"/>
  <ellipse cx="39.8" cy="30.5" rx="1.5" ry="0.7" transform="rotate(28 39.8 30.5)" fill="#ffcf5a"/>
  <circle cx="28.5" cy="17.5" r="0.9" fill="#ffd666" opacity="0.8"/>
  <circle cx="27.8" cy="30.7" r="0.8" fill="#ffc24d" opacity="0.75"/>
</svg>
