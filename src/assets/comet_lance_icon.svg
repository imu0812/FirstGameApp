<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgIce" x1="80" y1="72" x2="420" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#143658"/>
      <stop offset="45%" stop-color="#0C1D35"/>
      <stop offset="100%" stop-color="#06111E"/>
    </linearGradient>

    <linearGradient id="lanceBody" x1="118" y1="334" x2="380" y2="173" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#57C1F7"/>
      <stop offset="35%" stop-color="#9BEAFF"/>
      <stop offset="65%" stop-color="#E8FFFF"/>
      <stop offset="100%" stop-color="#B7F0FF"/>
    </linearGradient>

    <linearGradient id="lanceEdge" x1="162" y1="289" x2="412" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1CA8E8"/>
      <stop offset="100%" stop-color="#F5FFFF"/>
    </linearGradient>

    <radialGradient id="freezeBurst" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(390 151) rotate(90) scale(124 124)">
      <stop offset="0%" stop-color="#F0FFFF"/>
      <stop offset="35%" stop-color="#C8F7FF"/>
      <stop offset="75%" stop-color="#73D9FF"/>
      <stop offset="100%" stop-color="#2F87D8"/>
    </radialGradient>

    <filter id="softGlowIce" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="wideGlowIce" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.35
                0 0 0 0 0.85
                0 0 0 0 1
                0 0 0 0.85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlowIce" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgIce)"/>

  <!-- frost lanes -->
  <path d="M84 365
           C158 332, 194 303, 231 272
           C270 238, 316 198, 381 146"
        stroke="#5FD8FF" stroke-opacity="0.24" stroke-width="38" stroke-linecap="round" filter="url(#wideGlowIce)"/>

  <path d="M70 383
           C142 342, 187 311, 226 279
           C276 236, 326 193, 399 131"
        stroke="#C9FAFF" stroke-opacity="0.62" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 18"/>

  <path d="M102 404
           C164 355, 207 322, 246 288
           C304 237, 352 191, 422 116"
        stroke="#8DE6FF" stroke-opacity="0.26" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 18"/>

  <!-- ice shards in trail -->
  <g fill="#D9FBFF" fill-opacity="0.88" filter="url(#tinyGlowIce)">
    <path d="M116 362 L126 344 L136 362 L126 372 Z"/>
    <path d="M158 328 L168 310 L178 328 L168 338 Z"/>
    <path d="M207 292 L220 270 L233 292 L220 304 Z"/>
    <path d="M280 236 L291 219 L301 237 L291 247 Z"/>
  </g>

  <!-- main lance -->
  <g transform="translate(271 242) rotate(-34)" filter="url(#wideGlowIce)">
    <!-- rear fins -->
    <path d="M-129 10 L-68 -24 L-44 -10 L-105 24 Z" fill="#5FCDF8" opacity="0.86"/>
    <path d="M-118 31 L-62 8 L-38 32 L-92 49 Z" fill="#AEEFFF" opacity="0.70"/>
    <path d="M-131 -10 L-78 -38 L-52 -20 L-107 6 Z" fill="#318ED7" opacity="0.70"/>

    <!-- body -->
    <path d="M-56 -18
             C5 -43, 72 -48, 154 -46
             L194 0
             L153 44
             C71 45, 7 39, -56 18
             C-34 5, -34 -6, -56 -18 Z"
          fill="url(#lanceBody)"/>

    <!-- crystalline core -->
    <path d="M95 -35
             L168 0
             L95 35
             L22 0
             Z"
          fill="#F0FFFF" fill-opacity="0.88"/>

    <!-- spear head -->
    <path d="M163 -52
             L242 0
             L163 53
             C152 31, 139 18, 119 8
             C138 -1, 151 -18, 163 -52 Z"
          fill="url(#freezeBurst)"/>

    <!-- sharpened front line -->
    <path d="M145 -46
             L211 0
             L145 46"
          stroke="url(#lanceEdge)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- center highlight -->
    <path d="M-18 -4
             C32 -18, 72 -18, 126 0
             C74 18, 35 18, -18 4
             Z"
          fill="#FFFFFF" fill-opacity="0.56"/>
  </g>

  <!-- freeze burst -->
  <g transform="translate(391 150)" filter="url(#softGlowIce)">
    <circle r="17" fill="#F4FFFF"/>
    <path d="M0 -54 L10 -16 L47 -10 L15 8 L22 46 L0 19 L-22 46 L-15 8 L-47 -10 L-10 -16 Z"
          fill="#C8F8FF" fill-opacity="0.95"/>
    <path d="M0 -78 L6 -30 L42 -42 L19 -8 L60 0 L19 8 L42 42 L6 30 L0 78 L-6 30 L-42 42 L-19 8 L-60 0 L-19 -8 L-42 -42 L-6 -30 Z"
          fill="#8DE6FF" fill-opacity="0.52"/>
  </g>

  <!-- cold particles -->
  <g fill="#DDFBFF" filter="url(#tinyGlowIce)">
    <circle cx="120" cy="394" r="3.5"/>
    <circle cx="174" cy="349" r="3"/>
    <circle cx="241" cy="285" r="4"/>
    <circle cx="336" cy="205" r="3.2"/>
    <circle cx="430" cy="118" r="3.7"/>
  </g>

  <!-- small snow rune -->
  <g transform="translate(118 111)" opacity="0.7" filter="url(#softGlowIce)">
    <circle r="34" stroke="#8DE6FF" stroke-opacity="0.36" stroke-width="4"/>
    <path d="M0 -18 L0 18 M-15 -9 L15 9 M15 -9 L-15 9" stroke="#D6FCFF" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
